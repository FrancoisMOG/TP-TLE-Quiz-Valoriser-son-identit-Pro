<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Évaluation Préparateur de commandes Logistique</title>
    
    <!-- Typographies Industrielles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

    <!-- Librairie de génération PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --log-dark: #121212;
            --log-grey: #2b2b2b;
            --log-metal: #3a3a3a;
            --log-orange: #ff6b00;
            --log-yellow: #ffd500;
            --log-white: #f4f4f4;
            --log-red: #d32f2f;
            --log-green: #388e3c;
            --font-title: 'Oswald', sans-serif;
            --font-ui: 'Roboto Condensed', sans-serif;
            --font-data: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            background-color: var(--log-dark);
            color: var(--log-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* BANDE DE SÉCURITÉ (Hazmat Striping) */
        .hazard-strip {
            width: 100%;
            height: 15px;
            background: repeating-linear-gradient(
                45deg,
                var(--log-yellow),
                var(--log-yellow) 20px,
                var(--log-dark) 20px,
                var(--log-dark) 40px
            );
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            margin-top: 15px;
        }

        /* --- SCREENS MANAGEMENT --- */
        .screen {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEADER / INTRO --- */
        .header-intro {
            text-align: center;
            border: 4px solid var(--log-orange);
            padding: 40px 20px;
            background: var(--log-grey);
            margin-bottom: 30px;
            position: relative;
        }
        .header-intro::before {
            content: "ÉVALUATION";
            position: absolute;
            top: -16px;
            left: 20px;
            background: var(--log-orange);
            color: var(--log-dark);
            padding: 4px 15px;
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 1.2rem;
        }

        h1 {
            font-family: var(--font-title);
            text-transform: uppercase;
            font-size: 2.5rem;
            line-height: 1.1;
            margin-bottom: 15px;
            color: var(--log-white);
        }
        h1 span { color: var(--log-orange); }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; }

        label {
            font-family: var(--font-data);
            font-size: 0.9rem;
            color: var(--log-yellow);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select {
            background: var(--log-dark);
            border: 2px solid var(--log-metal);
            color: var(--log-white);
            padding: 15px;
            font-family: var(--font-ui);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: var(--log-orange); }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-family: var(--font-title);
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn-primary {
            background: var(--log-orange);
            color: var(--log-dark);
        }
        .btn-primary:hover { background: var(--log-yellow); transform: translateY(-2px); }
        .btn-primary:disabled { background: var(--log-metal); color: #666; cursor: not-allowed; transform: none; }

        /* --- QUIZ INTERFACE --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--log-metal);
            padding-bottom: 10px;
        }
        .quiz-counter {
            font-family: var(--font-data);
            color: var(--log-orange);
            font-size: 1.2rem;
        }
        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--log-metal);
            margin-bottom: 30px;
        }
        .progress-bar {
            height: 100%;
            background: var(--log-orange);
            transition: width 0.4s ease;
        }

        .question-box {
            background: var(--log-grey);
            padding: 30px;
            margin-bottom: 30px;
            border-left: 8px solid var(--log-yellow);
        }
        .question-text {
            font-size: 1.3rem;
            line-height: 1.5;
        }

        .options-grid { display: flex; flex-direction: column; gap: 15px; }

        .option-btn {
            background: var(--log-grey);
            border: 2px solid var(--log-metal);
            color: var(--log-white);
            text-align: left;
            padding: 20px;
            font-family: var(--font-ui);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--log-orange); background: var(--log-metal); }
        
        .option-btn.correct {
            border-color: var(--log-green);
            background: rgba(56, 142, 60, 0.2);
            color: #fff;
        }
        .option-btn.wrong {
            border-color: var(--log-red);
            background: rgba(211, 47, 47, 0.2);
            color: #fff;
        }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        .option-letter {
            background: var(--log-dark);
            color: var(--log-orange);
            padding: 5px 12px;
            margin-right: 15px;
            font-weight: bold;
            font-family: var(--font-data);
            flex-shrink: 0;
        }

        /* --- RESULTATS --- */
        .result-card {
            text-align: center;
            background: var(--log-grey);
            padding: 50px 20px;
            border: 4px solid var(--log-orange);
            margin-bottom: 30px;
        }
        .score-display {
            font-family: var(--font-title);
            font-size: 6rem;
            color: var(--log-orange);
            line-height: 1;
            margin: 20px 0;
        }
        .score-label {
            font-family: var(--font-data);
            color: var(--log-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .result-message {
            font-size: 1.4rem;
            margin-top: 10px;
            color: #ccc;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .score-display { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="hazard-strip"></div>

    <div class="container">
        
        <!-- ÉCRAN 1 : INTRODUCTION -->
        <div id="intro-screen" class="screen active">
            <div class="header-intro">
                <h1>Valoriser son identité profesionnelle <span>TP Technicien en Logistique d'Entreposage</span></h1>
            </div>

            <form id="intro-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" required placeholder="Dupont">
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" required placeholder="Jean">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Démarrer l'évaluation</button>
            </form>
        </div>

        <!-- ÉCRAN 2 : QUIZ -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="quiz-counter">QUESTION <span id="current-q">1</span>/10</div>
                <div class="quiz-counter" style="color: var(--log-white);">Temps : 15 min</div>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar" style="width: 10%;"></div>
            </div>

            <div id="question-container">
                <div class="question-box">
                    <div id="question-text" class="question-text"></div>
                </div>
                <div id="options-container" class="options-grid"></div>
            </div>

            <button id="next-btn" class="btn btn-primary" disabled>Question suivante</button>
        </div>

        <!-- ÉCRAN 3 : RÉSULTATS -->
        <div id="result-screen" class="screen">
            <div class="result-card">
                <div class="score-label">Votre score final</div>
                <div id="score-value" class="score-display">0/10</div>
                <div id="result-message" class="result-message"></div>
            </div>
            <button id="download-pdf" class="btn btn-primary">Télécharger le rapport PDF</button>
        </div>

    </div>

    <script>
        // --- DATA & STATE ---
        const quizData = [
            {
                q: "Quelle est la règle d'or absolue dans le secteur de la logistique concernant la dualité entre la rapidité et la sécurité ?",
                options: [
                    "La rapidité prime toujours pour satisfaire le client à tout prix.",
                    "La sécurité passe toujours avant la performance ou la vitesse.",
                    "La sécurité et la vitesse ont exactement le même niveau de priorité.",
                    "La sécurité dépend uniquement de la taille de l'entrepôt."
                ],
                answer: 1,
                justification: "La règle d'or stipule que la sécurité passe toujours avant la performance ou la vitesse."
            },
            {
                q: "Le « positionnement professionnel » d'un technicien permet de se distinguer en répondant à trois questions fondamentales. Lesquelles ?",
                options: [
                    "D'où je viens ? Où je vais ? Quel est mon salaire actuel ?",
                    "Qui je suis professionnellement ? Quelles sont mes forces ? Qu'est-ce que j'apporte à l'entreprise ?",
                    "Quel est mon diplôme ? Combien d'heures puis-je faire ? Quand puis-je commencer ?",
                    "Qui est mon manager ? Quels sont mes horaires ? Quel logiciel j'utilise ?"
                ],
                answer: 1,
                justification: "Les trois questions fondamentales du positionnement professionnel sont : Qui je suis professionnellement ? Quelles sont mes forces ? Qu'est-ce que j'apporte à l'entreprise ?"
            },
            {
                q: "Quelle est l'erreur fréquente commise par le grand public concernant la définition du métier de technicien en logistique ?",
                options: [
                    "Penser que le technicien ne travaille que la nuit.",
                    "Croire que la logistique se résume à de la simple manutention et à déplacer des produits.",
                    "Imaginer que le métier se fait uniquement sur ordinateur sans jamais aller sur le terrain.",
                    "Penser que c'est un métier réservé au secteur de l'automobile."
                ],
                answer: 1,
                justification: "L'erreur fréquente est de croire que la logistique se résume à de la simple manutention et à déplacer des produits."
            },
            {
                q: "Quelle est la structure précise (en 5 étapes) que doit adopter un technicien pour construire son pitch professionnel ?",
                options: [
                    "CV, Lettre de motivation, Diplôme, Prétentions salariales, Disponibilité.",
                    "Accroche, Compétences clés, Formation/Expérience, Valeur ajoutée, Objectif professionnel.",
                    "Présentation personnelle, Défauts, Qualités, Loisirs, Conclusion.",
                    "Bonjour, Poste recherché, Entreprises passées, Compétences informatiques, Merci."
                ],
                answer: 1,
                justification: "La structure précise en 5 étapes du pitch est : Accroche, Compétences clés, Formation/Expérience, Valeur ajoutée, Objectif professionnel."
            },
            {
                q: "Selon le cours, quelle est la durée idéale d'un pitch professionnel efficace ?",
                options: [
                    "Entre 5 et 10 minutes.",
                    "Entre 2 et 3 minutes.",
                    "Entre 30 et 45 secondes.",
                    "Moins de 10 secondes."
                ],
                answer: 2,
                justification: "Selon le cours, la durée idéale d'un pitch professionnel efficace est de 30 à 45 secondes."
            },
            {
                q: "Parmi les trios d'outils suivants, lequel représente les trois outils numériques indispensables à maîtriser au quotidien ?",
                options: [
                    "WMS, PDA, ERP.",
                    "Excel, Word, PowerPoint.",
                    "GPS, CRM, Bluetooth.",
                    "SAP, Windows, Intranet."
                ],
                answer: 0,
                justification: "Les trois outils numériques indispensables à maîtriser au quotidien sont le WMS, le PDA et l'ERP."
            },
            {
                q: "Quelles sont les trois attitudes professionnelles strictement attendues en cas de situation sensible ou d'incident sur le terrain ?",
                options: [
                    "Agir vite par soi-même, improviser une solution, cacher l'erreur.",
                    "Garder son calme, appliquer les procédures sans improvisation, signaler immédiatement à sa hiérarchie.",
                    "Appeler les collègues, modifier le planning, attendre la fin de la journée.",
                    "Stopper toute l'usine, évacuer le bâtiment, appeler les secours extérieurs."
                ],
                answer: 1,
                justification: "Les trois attitudes attendues sont : Garder son calme, appliquer les procédures sans improvisation, signaler immédiatement à sa hiérarchie."
            },
            {
                q: "Dans le podcast, à quel autre métier de contrôle et de haute responsabilité compare-t-on le technicien en logistique ?",
                options: [
                    "À un chirurgien en plein bloc opératoire.",
                    "À un pilote de Formule 1 en pleine course.",
                    "À un contrôleur aérien dans sa tour de contrôle.",
                    "À un chef d'orchestre devant ses musiciens."
                ],
                answer: 2,
                justification: "Dans le podcast, on compare le technicien en logistique à un contrôleur aérien dans sa tour de contrôle."
            },
            {
                q: "Parmi les propositions suivantes, quel groupe de compétences comportementales (soft skills) est indispensable pour ce métier ?",
                options: [
                    "Créativité artistique, force physique, sens du design.",
                    "Vigilance permanente, capacité d'analyse, gestion du stress et communication.",
                    "Indépendance totale, goût du risque, discrétion absolue.",
                    "Rapidité d'exécution, compétition, autonomie financière."
                ],
                answer: 1,
                justification: "Le groupe de soft skills indispensable est la vigilance permanente, la capacité d'analyse, la gestion du stress et la communication."
            },
            {
                q: "Pourquoi est-il déconseillé à un candidat de présenter une \"liste de courses\" générique de ses expériences passées en entretien ?",
                options: [
                    "Parce que cela prend trop de temps à lire pour le recruteur.",
                    "Parce qu'il faut plutôt proposer une \"proposition de valeur ciblée\" adaptée aux besoins spécifiques de l'employeur.",
                    "Parce que les listes de courses ne concernent pas le secteur industriel.",
                    "Parce qu'il vaut mieux ne pas parler de ses expériences passées."
                ],
                answer: 1,
                justification: "Il est déconseillé car il faut plutôt proposer une \"proposition de valeur ciblée\" adaptée aux besoins spécifiques de l'employeur."
            }
        ];

        let userData = {};
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = [];

        // --- DOM ELEMENTS ---
        const introScreen = document.getElementById('intro-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const introForm = document.getElementById('intro-form');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const currentQEl = document.getElementById('current-q');
        const progressBar = document.getElementById('progress-bar');
        
        const scoreValue = document.getElementById('score-value');
        const resultMessage = document.getElementById('result-message');
        const downloadBtn = document.getElementById('download-pdf');

        // --- FUNCTIONS ---
        function showScreen(screen) {
            [introScreen, quizScreen, resultScreen].forEach(s => s.classList.remove('active'));
            screen.classList.add('active');
            window.scrollTo(0, 0);
        }

        function loadQuestion() {
            nextBtn.disabled = true;
            const qData = quizData[currentQuestionIndex];
            
            currentQEl.innerText = currentQuestionIndex + 1;
            progressBar.style.width = `${(currentQuestionIndex + 1) * 10}%`;
            questionText.innerText = qData.q;
            
            optionsContainer.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            
            qData.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerHTML = `<span class="option-letter">${letters[index]}</span><span>${option}</span>`;
                
                btn.addEventListener('click', () => selectAnswer(index, btn));
                optionsContainer.appendChild(btn);
            });

            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerText = "Voir mon résultat";
            } else {
                nextBtn.innerText = "Question suivante";
            }
        }

        function selectAnswer(selectedIndex, btnElement) {
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            userAnswers.push(selectedIndex);
            
            const correctIndex = quizData[currentQuestionIndex].answer;
            
            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allBtns[correctIndex].classList.add('correct');
            }
            
            nextBtn.disabled = false;
        }

        function showResults() {
            scoreValue.innerText = `${score}/10`;
            
            if (score === 10) {
                resultMessage.innerText = "Excellent ! Maîtrise parfaite de votre identité professionnelle.";
            } else if (score >= 8) {
                resultMessage.innerText = "Très bon niveau. Vous êtes prêt pour l'entretien.";
            } else if (score >= 5) {
                resultMessage.innerText = "Résultat correct. Quelques points à réviser pour optimiser votre démarche.";
            } else {
                resultMessage.innerText = "Attention, des lacunes subsistent. Une relecture du cours est fortement recommandée.";
            }
            
            showScreen(resultScreen);
        }

        // Fonction pour éviter les bugs d'accents dans le PDF
        function sanitizeString(text) {
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                       .replace(/œ/g, "oe").replace(/æ/g, "ae")
                       .replace(/'/g, "'").replace(/'/g, "'")
                       .replace(/"/g, '"').replace(/"/g, '"');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let y = 20;

            // En-tête
            doc.setFillColor(38, 38, 38);
            doc.rect(0, 0, pageWidth, 40, 'F');
            doc.setFillColor(255, 107, 0);
            doc.rect(0, 38, pageWidth, 4, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont('helvetica', 'bold');
            doc.text("RAPPORT D'EVALUATION : PREPARATEUR DE COMMANDES", margin, 25);

            y = 55;

            // Infos Candidat
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.text("INFORMATIONS CANDIDAT", margin, y);
            y += 8;
            doc.setFont('helvetica', 'normal');
            doc.text(`Nom : ${sanitizeString(userData.nom)}`, margin, y); y += 6;
            doc.text(`Prenom : ${sanitizeString(userData.prenom)}`, margin, y); y += 15;

            // Résultat Principal
            doc.setFillColor(240, 240, 240);
            doc.roundedRect(margin, y, pageWidth - (margin*2), 30, 3, 3, 'F');
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text(`SCORE FINAL : ${score} / 10`, margin + 10, y + 18);
            y += 45;

            // Détail des réponses
            doc.setFontSize(12);
            doc.text("DETAIL DES REPONSES", margin, y);
            y += 10;

            quizData.forEach((q, index) => {
                if (y > 250) {
                    doc.addPage();
                    y = 20;
                }

                const isCorrect = userAnswers[index] === q.answer;
                const userAns = q.options[userAnswers[index]];
                const correctAns = q.options[q.answer];

                doc.setFont('helvetica', 'bold');
                doc.setFontSize(11);
                doc.text(`Question ${index + 1} :`, margin, y);
                y += 6;
                
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                const qTextLines = doc.splitTextToSize(sanitizeString(q.q), pageWidth - (margin*2));
                doc.text(qTextLines, margin, y);
                y += qTextLines.length * 5 + 4;

                if (isCorrect) {
                    doc.setTextColor(56, 142, 60);
                    doc.text("Votre reponse : CORRECTE", margin, y);
                } else {
                    doc.setTextColor(211, 47, 47);
                    doc.text("Votre reponse : FAUSSE", margin, y);
                    y += 5;
                    doc.setTextColor(0, 0, 0);
                    doc.text(`Reponse correcte : ${sanitizeString(correctAns)}`, margin, y);
                }
                y += 5;
                
                doc.setTextColor(100, 100, 100);
                doc.setFontSize(9);
                const justLines = doc.splitTextToSize(`Justification : ${sanitizeString(q.justification)}`, pageWidth - (margin*2));
                doc.text(justLines, margin, y);
                y += justLines.length * 4 + 10;

                doc.setTextColor(0, 0, 0);
            });

            doc.save(`Rapport_Quiz_Preparateur_de_commandes_${sanitizeString(userData.nom)}.pdf`);
        }

        // --- EVENT LISTENERS (Le correctif principal) ---
        
        // 1. Validation du formulaire d'intro
        introForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Empêche le rechargement de la page !
            userData.nom = document.getElementById('nom').value;
            userData.prenom = document.getElementById('prenom').value;
            showScreen(quizScreen);
            loadQuestion();
        });

        // 2. Passage à la question suivante ou résultats
        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        // 3. Téléchargement du PDF
        downloadBtn.addEventListener('click', generatePDF);

    </script>
</body>
</html>
